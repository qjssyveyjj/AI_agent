services:
  redis:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: m.daocloud.io/docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: aiagent
      POSTGRES_DB: aiagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  redis_data:
  postgres_data:
